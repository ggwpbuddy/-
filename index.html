<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ГГВП — поиск тиммейтов</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Unbounded:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pk:#FF3D7F;--pk2:#ff2d72;--pk-soft:#ff7aa6;
  --acc:#7C6CFF;--acc2:#9b8dff;
  --cy:#36E2D0;--cy-soft:#7af0e4;
  --dark:#070709;--dark2:#0B0B10;
  --card:#101017;--card2:#16161f;--card3:#1d1d28;
  --bd:#212130;--bd2:#30303f;
  --white:#F4F2F8;--muted:#9897ab;--muted2:#5a5a70;
  --green:#3DDC97;--blue:#6CA8FF;--purple:#B09CF7;--amber:#FFB454;
  --px:'VT323',monospace;
  --mono:'Inter',monospace;
  --sans:'Unbounded','Inter',sans-serif;
  --ui:'Inter',sans-serif;
  --body:'Inter',sans-serif;
  --sb:264px;
  --grad:linear-gradient(115deg,#FF3D7F 0%,#FF5C9A 38%,#9B6CFF 78%,#36E2D0 130%);
  --grad-2:linear-gradient(120deg,#FF3D7F,#7C6CFF);
  --grad-soft:linear-gradient(135deg,rgba(255,61,127,.16),rgba(124,108,255,.1));
  --glow-pk:0 0 0 1px rgba(255,61,127,.25),0 8px 30px rgba(255,61,127,.28);
}
html,body,#root{height:100%;background:var(--dark);color:var(--white);font-family:var(--body);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
html,body{overflow-x:hidden;max-width:100%;position:relative;overscroll-behavior-y:none}
/* мобильный корень: фиксируем под видимую высоту экрана телефона (адресная строка не режет) */
.mobile-root{display:flex;flex-direction:column;overflow:hidden;width:100%;height:100vh;height:100dvh}
body{
  background:
    radial-gradient(1200px 760px at 88% -12%,rgba(124,108,255,.13),transparent 58%),
    radial-gradient(1000px 680px at -8% 112%,rgba(255,61,127,.11),transparent 55%),
    radial-gradient(700px 500px at 50% 120%,rgba(54,226,208,.06),transparent 60%),
    var(--dark);
  position:relative;
}
/* fine grid texture + scanlines for arcade-terminal atmosphere */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background-image:linear-gradient(rgba(124,108,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(124,108,255,.035) 1px,transparent 1px);
  background-size:38px 38px;mask-image:radial-gradient(circle at 50% 35%,#000 30%,transparent 85%)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.5;mix-blend-mode:overlay;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 3px)}
#root{position:relative;z-index:2}
/* CRT vignette for arcade depth */
body > #root::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:50;box-shadow:inset 0 0 180px 30px rgba(0,0,0,.55)}
button{cursor:pointer;font-family:var(--ui)}
input,textarea,select{font-family:var(--body);background:#0e0e15;color:var(--white);border:1px solid var(--bd);border-radius:12px;padding:11px 13px;font-size:14px;outline:none;width:100%;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;-moz-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--pk);box-shadow:0 0 0 3px rgba(255,61,127,.14);background:#11111a}
select option{background:#0e0e15;color:var(--white)}
textarea{resize:vertical;min-height:74px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#3a3a48}
a.lnk{color:var(--cy-soft);text-decoration:none;border-bottom:1px solid rgba(122,240,228,.4);word-break:break-all}
a.lnk:hover{color:#fff;border-color:#fff}
.bub.mine a.lnk{color:#fff;border-bottom-color:rgba(255,255,255,.6)}

/* PIXEL LOGO */
@font-face{font-family:'QuinqueFive';src:url('https://db.onlinewebfonts.com/t/57d70ee5fb6b1e4f2ca661a4216f4e10.woff2') format('woff2'),url('https://db.onlinewebfonts.com/t/57d70ee5fb6b1e4f2ca661a4216f4e10.woff') format('woff'),url('https://db.onlinewebfonts.com/t/57d70ee5fb6b1e4f2ca661a4216f4e10.ttf') format('truetype');font-display:swap}
.logo{font-family:'QuinqueFive','VT323',monospace;letter-spacing:.06em;text-transform:uppercase;color:#fff;display:inline-block;line-height:1;text-shadow:0 0 16px rgba(255,61,127,.5),0 0 3px rgba(124,108,255,.5)}
.logo-px{display:inline-flex;gap:0;align-items:center}

/* APP SHELL */
.app-shell{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:var(--sb);min-width:var(--sb);background:linear-gradient(180deg,#0b0b11,#08080c);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,rgba(124,108,255,.25),transparent)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid var(--bd)}
.sb-tagline{font-family:var(--px);font-size:11px;color:var(--muted2);letter-spacing:.18em;margin-top:11px;text-transform:uppercase;line-height:1.6}
.sb-nav{flex:1;padding:16px 12px 6px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.nb{display:flex;align-items:center;gap:13px;padding:12px 14px;border:none;background:none;color:var(--muted);font-size:14.5px;font-family:var(--ui);font-weight:600;width:100%;text-align:left;cursor:pointer;transition:all .16s;border-radius:13px;position:relative;letter-spacing:.01em}
.nb-ic{width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border-radius:10px;background:#14141d;border:1px solid var(--bd);flex-shrink:0;transition:all .16s;color:var(--muted)}
.nb:hover .nb-ic{border-color:var(--bd2);color:var(--white)}
.nb.on .nb-ic{background:var(--grad-soft);border-color:rgba(255,61,127,.3);color:var(--pk-soft)}
.nb:hover{color:var(--white);background:#14141d}
.nb.on{color:var(--white);background:linear-gradient(100deg,rgba(255,61,127,.16),rgba(124,108,255,.08));box-shadow:inset 0 0 0 1px rgba(255,61,127,.22)}
.nb.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:0 3px 3px 0;background:var(--grad-2);box-shadow:0 0 10px var(--pk)}
.nb-badge{background:var(--grad-2);color:#fff;font-family:var(--px);font-size:11px;border-radius:6px;padding:4px 6px;margin-left:auto;flex-shrink:0;letter-spacing:0}
.nb-dot{width:7px;height:7px;border-radius:50%;background:var(--cy);margin-left:auto;box-shadow:0 0 8px var(--cy)}
.sb-section{padding:8px 12px 4px;font-family:var(--px);font-size:12px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase}
.sb-online{margin:0 12px 10px;background:linear-gradient(160deg,#12121b,#0d0d13);border:1px solid var(--bd);border-radius:15px;padding:14px}
.sb-online-title{font-family:var(--px);font-size:12px;color:var(--muted2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;line-height:1.5}
.sb-online-title::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.sb-online-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;border-radius:9px;padding:3px;margin-left:-3px;margin-right:-3px;transition:background .14s}
.sb-online-row:hover{background:#16161f}
.sb-online-row:last-child{margin-bottom:0}
.sb-online-nick{font-size:12.5px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-foot{padding:12px;border-top:1px solid var(--bd)}
.sf{display:flex;align-items:center;gap:11px;cursor:pointer;padding:11px;border-radius:14px;transition:all .15s;border:1px solid transparent}
.sf:hover{background:#14141d;border-color:var(--bd)}
.sf-nick{font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--white)}
.sf-status{font-family:var(--px);font-size:12px;color:var(--green);letter-spacing:.04em;margin-top:5px;line-height:1.4}
/* SIDEBAR CTA */
.sb-cta{margin:10px 12px 16px;padding:16px;border-radius:16px;border:1px solid var(--bd2);background:linear-gradient(150deg,#15111f,#0e0c14);cursor:pointer;position:relative;overflow:hidden;transition:transform .16s,border-color .16s;flex-shrink:0}
.sb-cta:hover{transform:translateY(-2px);border-color:rgba(255,61,127,.35)}
.sb-cta-glow{position:absolute;top:-50%;right:-30%;width:160px;height:160px;background:radial-gradient(circle,rgba(255,61,127,.3),transparent 70%);pointer-events:none}
.sb-cta-ic{width:38px;height:38px;border-radius:11px;background:var(--grad-2);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;margin-bottom:12px;box-shadow:0 4px 16px rgba(255,61,127,.35)}
.sb-cta-t{font-family:var(--sans);font-weight:600;font-size:14px;color:#fff;margin-bottom:5px;letter-spacing:-.01em}
.sb-cta-s{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:13px}
.sb-cta-btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--px);font-size:11px;color:var(--pk-soft);letter-spacing:.04em}

/* DESKTOP HEADER */
.main-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.desk-hdr{display:flex;align-items:center;gap:14px;padding:18px 34px;border-bottom:1px solid var(--bd);background:rgba(11,11,16,.6);backdrop-filter:blur(10px);flex-shrink:0}
.desk-hdr-title{font-size:17px;font-weight:600;flex:1;color:var(--white);font-family:var(--sans);letter-spacing:-.01em;display:flex;align-items:center;gap:11px}
.desk-hdr-title .tdot{width:8px;height:8px;border-radius:2px;background:var(--grad-2);box-shadow:0 0 10px var(--pk);transform:rotate(45deg)}
.desk-hdr-right{display:flex;align-items:center;gap:11px}

/* CONTENT */
.content-area{flex:1;overflow-y:auto;padding:32px 34px}
.content-area.no-pad{padding:0;overflow:hidden}
.content-wrap{max-width:780px;margin:0 auto}

/* MOBILE BITS */
/* MOBILE NAV — active tab is a glowing pill with label, others icon-only */
.mnav{display:flex;align-items:center;justify-content:space-around;gap:5px;padding:9px 10px;background:rgba(11,11,16,.92);backdrop-filter:blur(14px);border-top:1px solid var(--bd);flex-shrink:0}
.mnav-i{display:flex;align-items:center;gap:8px;border:none;background:none;cursor:pointer;color:var(--muted);padding:9px 12px;border-radius:14px;transition:all .2s cubic-bezier(.3,1,.4,1);position:relative;min-height:46px}
.mnav-i:active{transform:scale(.92)}
.mnav-i.on{color:#fff;background:var(--grad-2);box-shadow:0 5px 18px rgba(255,61,127,.4);padding:9px 16px}
.mnav-ic{position:relative;display:inline-flex}
.mnav-i svg{flex-shrink:0}
.mnav-lbl{font-family:var(--sans);font-weight:600;font-size:13px;letter-spacing:-.01em;white-space:nowrap;animation:navlbl .25s ease}
@keyframes navlbl{from{opacity:0;max-width:0}to{opacity:1;max-width:90px}}
.mnav-dot{width:8px;height:8px;border-radius:50%;background:var(--cy);position:absolute;top:-2px;right:-3px;box-shadow:0 0 7px var(--cy);border:1.5px solid var(--dark2)}
.mnav-i.on .mnav-dot{background:#fff;box-shadow:none;border-color:transparent}

/* CARDS */
.card{background:linear-gradient(162deg,var(--card),#0d0d14);border:1px solid var(--bd);border-radius:18px;padding:18px;transition:border-color .16s,transform .16s,box-shadow .16s}
.card:hover{border-color:var(--bd2)}
.card2{background:var(--card2);border:1px solid var(--bd);border-radius:14px;padding:14px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:12px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:var(--ui);transition:all .15s;white-space:nowrap;line-height:1;text-align:center}
.btn-p{background:var(--grad-2);color:#fff;box-shadow:0 4px 18px rgba(255,61,127,.3)}
.btn-p:hover{filter:brightness(1.08);box-shadow:0 7px 24px rgba(255,61,127,.44);transform:translateY(-1px)}
.btn-p:active{transform:translateY(0)}
.btn-p:disabled{opacity:.32;cursor:default;box-shadow:none;transform:none;filter:none}
.btn-g{background:#14141d;border:1px solid var(--bd2);color:var(--white)}
.btn-g:hover{border-color:#4a4a5a;background:#1b1b25}
.btn-d{background:transparent;border:1px solid #57212f;color:var(--pk-soft)}
.btn-d:hover{background:rgba(255,61,127,.1);border-color:var(--pk)}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:10px}
.btn-fw{width:100%}
.btn svg{width:1.15em;height:1.15em}
.btn-sm svg{width:1.05em;height:1.05em}

/* FORM */
.fg{margin-bottom:16px}
.fl{display:block;font-family:var(--px);font-size:12px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px;line-height:1.5}
.fhint{font-size:12px;color:var(--muted2);margin-top:5px;line-height:1.5}

/* TAGS */
.tag{font-family:var(--mono);font-size:11px;border-radius:8px;padding:4px 10px;letter-spacing:.01em;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-weight:600}
.tg{background:rgba(108,168,255,.12);color:var(--blue);border:1px solid rgba(108,168,255,.22)}
.tg-match{background:rgba(61,220,151,.16);color:var(--green);border:1px solid rgba(61,220,151,.4);font-family:var(--mono);font-size:11px;border-radius:8px;padding:4px 10px;font-weight:700;letter-spacing:.01em;display:inline-flex;align-items:center;box-shadow:0 0 12px rgba(61,220,151,.18)}
.match-pill{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--green);background:rgba(61,220,151,.13);border:1px solid rgba(61,220,151,.35);padding:3px 9px;border-radius:8px}
.tr{background:rgba(255,61,127,.1);color:var(--pk-soft);border:1px solid rgba(255,61,127,.24)}
.tw{display:flex;flex-wrap:wrap;gap:6px;padding:9px;background:#0e0e15;border:1px solid var(--bd);border-radius:12px;min-height:46px;cursor:text;align-items:flex-start}
.tw:focus-within{border-color:var(--pk);box-shadow:0 0 0 3px rgba(255,61,127,.14)}
.tw input{background:none;border:none;outline:none;font-size:13px;color:var(--white);min-width:90px;flex:1;padding:3px 4px;box-shadow:none}
.tx{background:none;border:none;color:inherit;font-size:12px;padding:0 0 0 2px;cursor:pointer;opacity:.55}.tx:hover{opacity:1}

/* ROLES PICKER */
.role-pick-wrap{margin-bottom:6px}
.role-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.role-chip{font-family:var(--mono);font-size:11px;padding:5px 11px;border-radius:9px;border:1px solid var(--bd2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;letter-spacing:.01em;font-weight:600}
.role-chip:hover{border-color:var(--pk);color:var(--pk-soft)}
.role-chip.sel{background:rgba(255,61,127,.12);border-color:var(--pk);color:var(--pk-soft)}

/* SECTION LABEL */
.sl{font-family:var(--px);font-size:12px;color:var(--muted2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:13px;display:flex;align-items:center;gap:10px;line-height:1.5}
.sl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--bd),transparent)}

/* PAGE HEADER */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px}
.ph-t{font-size:18px;font-weight:600;color:var(--white);font-family:var(--sans);letter-spacing:-.01em;display:flex;align-items:center;gap:11px}
.ph-t::before{content:'';width:9px;height:9px;background:var(--grad-2);box-shadow:0 0 12px var(--pk);transform:rotate(45deg);flex-shrink:0}

/* DOTS */
.odot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 0 2px rgba(61,220,151,.18),0 0 9px rgba(61,220,151,.55)}
.fdot{width:8px;height:8px;border-radius:50%;background:#33333f;flex-shrink:0}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(4,4,8,.82);backdrop-filter:blur(9px);z-index:600;display:flex;align-items:center;justify-content:center;padding:16px;animation:fade .2s ease}
.mbox{background:linear-gradient(165deg,#14141d,#0c0c12);border:1px solid #2c2c3a;border-radius:22px;padding:26px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 90px rgba(0,0,0,.7);position:relative}
.mbox::before{content:'';position:absolute;top:0;left:22px;right:22px;height:2px;background:var(--grad);border-radius:2px;opacity:.7}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mt{font-size:16px;font-weight:600;font-family:var(--sans);letter-spacing:-.01em}

/* RADAR BARS */
.rb{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rbn{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:78px;letter-spacing:.01em;font-weight:500}
.rbt{flex:1;height:5px;background:#1d1d28;border-radius:3px;overflow:hidden}
.rbf{height:5px;border-radius:3px;transition:width .5s cubic-bezier(.3,1,.4,1)}
.rbv{font-family:var(--px);font-size:14px;min-width:16px;text-align:right}

/* SLIDERS */
.sr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.srl{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:80px;letter-spacing:.01em;font-weight:500}
.srv{font-family:var(--px);font-size:14px;min-width:16px;text-align:right}
input[type=range]{-webkit-appearance:none;height:5px;background:#1d1d28;border-radius:3px;border:none;padding:0;cursor:pointer;flex:1;min-width:0;width:100%;box-shadow:none}
input[type=range]:focus{box-shadow:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:4px;background:var(--grad-2);cursor:pointer;box-shadow:0 0 0 4px rgba(255,61,127,.18)}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border:none;border-radius:4px;background:var(--pk);cursor:pointer}

/* PROFILE HERO */
.prof-hero{display:flex;align-items:center;gap:18px;padding:24px;background:linear-gradient(130deg,rgba(255,61,127,.13),rgba(124,108,255,.07) 60%,rgba(54,226,208,.05)),var(--card);border:1px solid var(--bd2);border-radius:22px;margin-bottom:16px;position:relative;overflow:hidden}
.prof-hero::after{content:'';position:absolute;top:-50%;right:-8%;width:260px;height:260px;background:radial-gradient(circle,rgba(124,108,255,.22),transparent 70%);pointer-events:none}
.prof-hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:16px 16px;mask-image:linear-gradient(115deg,#000,transparent 55%);pointer-events:none}

/* AVATAR UPLOAD */
.aup{position:relative;cursor:pointer;display:inline-flex;flex-shrink:0}
.aup-ov{position:absolute;inset:0;border-radius:inherit;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;pointer-events:none;flex-direction:column;gap:4px}
.aup:hover .aup-ov,.aup:active .aup-ov{opacity:1}
.aup input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;font-size:0}

/* ONBOARDING + LOGIN */
.ob{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;position:relative}
.ob-b{background:linear-gradient(165deg,#14141d,#0b0b11);border:1px solid #2a2a36;border-radius:26px;padding:34px;width:100%;max-width:450px;box-shadow:0 30px 100px rgba(0,0,0,.6);position:relative;overflow:hidden}
.ob-b::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad)}

<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback}=React;

/* ── GAME ROLES (inline fallback if game-roles.js not loaded) ── */
const GAME_ROLES_DATA = (typeof GAME_ROLES !== 'undefined') ? GAME_ROLES : {
  "Valorant":["Duelist","Sentinel","Controller","Initiator","IGL (капитан)","Entry Fragger","Support","Lurker"],
  "CS2":["Entry Fragger","AWPer","Rifler","IGL (капитан)","Support","Lurker","Secondary AWP","Clutcher"],
  "Dota 2":["Pos 1 (Carry)","Pos 2 (Мид)","Pos 3 (Оффлейн)","Pos 4 (Поддержка)","Pos 5 (Хард Саппорт)","Ganker","Initiator","Pusher"],
  "League of Legends":["Top (Топ)","Jungle (Лес)","Mid (Мид)","ADC (Бот)","Support (Саппорт)","Flex","Tank","AP Carry"],
  "Apex Legends":["Fragger (Убийца)","Support (Поддержка)","Scout (Разведчик)","IGL (Лидер)","Wraith Main","Lifeline Main","Pathfinder Main","Horizon Main"],
  "Overwatch 2":["Tank","DPS (Damage)","Support (Healer)","Flex","Tracer Main","Reinhardt Main","Ana Main","Lucio Main"],
  "Fortnite":["Fragger","Builder (Строитель)","IGL (Лидер)","Support","Sniper","Rusher"],
  "PUBG":["Fragger","Sniper","Driver (Водитель)","Fragger / Entry","Support","IGL (Лидер)"],
  "Rust":["Raider (Рейдер)","Builder (Строитель)","Farmer (Фармер)","PVP Fighter","Scout (Разведчик)","Crafter (Крафтер)"],
  "Minecraft":["Builder (Строитель)","Redstoner","PVP Fighter","Farmer (Фармер)","Explorer (Исследователь)","Admin / Организатор"],
};
const GAMES=Object.keys(GAME_ROLES_DATA);

/* ── STORAGE ── */
/* ════ БЭКЕНД: данные в Supabase (общие, realtime). Настройка — в КАК_ЗАПУСТИТЬ.md. ════ */
const SUPABASE_URL = 'https://kiicfzxhcmkoiqwjmisw.supabase.co/rest/v1/';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpaWNmenhoY21rb2lxd2ptaXN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5OTI4NzEsImV4cCI6MjA5NjU2ODg3MX0.juLdhHBKpYKOIUrJmxoP-4a2vhtY9T_zN0qeG5OveuI';
const CONFIGURED = !/ВСТАВЬ_СЮДА/.test(SUPABASE_URL+SUPABASE_ANON_KEY);
const sb = CONFIGURED ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
const LOCAL_KEYS = ['gv:me','gv:tut:seen'];
const isLocalKey = k => LOCAL_KEYS.includes(k);
const localLS = {
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  del(k){try{localStorage.removeItem(k)}catch{}},
};
const cache = new Map();
let onCacheChange = null;
const notifyChange = ()=>{ if(onCacheChange) onCacheChange(); };
const ls = {
  get(k){ if(isLocalKey(k)) return localLS.get(k); return cache.has(k)?cache.get(k):null; },
  set(k,v){
    if(isLocalKey(k)){ localLS.set(k,v); return; }
    cache.set(k,v); notifyChange();
    if(sb) sb.from('kv').upsert({key:k,value:v,updated_at:new Date().toISOString()}).then(({error})=>{ if(error) console.warn('sb set',k,error.message); });
  },
  del(k){
    if(isLocalKey(k)){ localLS.del(k); return; }
    cache.delete(k); notifyChange();
    if(sb) sb.from('kv').delete().eq('key',k).then(({error})=>{ if(error) console.warn('sb del',k,error.message); });
  },
  list(p){ const r=[]; for(const k of cache.keys()){ if(k.startsWith(p)) r.push(k); } return r; }
};
async function initBackend(){
  if(!sb) return;
  const { data, error } = await sb.from('kv').select('key,value');
  if(error){ console.warn('initBackend',error.message); }
  else { (data||[]).forEach(row=>cache.set(row.key,row.value)); }
  sb.channel('kv-rt').on('postgres_changes',{event:'*',schema:'public',table:'kv'},payload=>{
    const row=payload.new||payload.old; if(!row||!row.key) return;
    if(payload.eventType==='DELETE') cache.delete(row.key); else cache.set(row.key,row.value);
    notifyChange();
  }).subscribe();
  notifyChange();
}

/* ── HELPERS ── */
const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36);
const now=()=>Date.now();
const fmtAgo=t=>{const d=now()-t;if(d<60000)return'только что';if(d<3600000)return Math.floor(d/60000)+'м';if(d<86400000)return Math.floor(d/3600000)+'ч';return Math.floor(d/86400000)+'д'};
const fmtTime=t=>new Date(t).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
const DA=[{key:'a0',label:'агрессия',color:'#FF5C7A'},{key:'a1',label:'команда',color:'#6CA8FF'},{key:'a2',label:'коммуник.',color:'#3DDC97'},{key:'a3',label:'юмор',color:'#B09CF7'}];
const PALS=[{bg:'#3a1a26',fg:'#FF7A93'},{bg:'#1a2438',fg:'#6CA8FF'},{bg:'#0d2e28',fg:'#3DDC97'},{bg:'#241a3e',fg:'#B09CF7'},{bg:'#2e1f0d',fg:'#FFB454'},{bg:'#1a2e1f',fg:'#7EE0A0'}];
const pal=id=>PALS[(id||'x').charCodeAt(0)%PALS.length];
const ONLINE_TTL=90000;

/* ── LINKIFY — превращает ссылки в кликабельные ── */
const URL_RE=/(\bhttps?:\/\/[^\s<]+|\bwww\.[^\s<]+|\b(?:vk\.com|t\.me|discord\.gg|steamcommunity\.com)\/[^\s<]+)/gi;
function Linkify({text}){
  if(!text)return null;
  const parts=[];let last=0,m;URL_RE.lastIndex=0;
  while((m=URL_RE.exec(text))!==null){
    if(m.index>last)parts.push(text.slice(last,m.index));
    let raw=m[0],trail='';
    const tm=raw.match(/[.,!?;:)]+$/);if(tm){trail=tm[0];raw=raw.slice(0,-trail.length)}
    const href=raw.startsWith('http')?raw:'https://'+raw;
    parts.push(<a key={m.index} className='lnk' href={href} target='_blank' rel='noopener noreferrer' onClick={e=>e.stopPropagation()}>{raw}</a>);
    if(trail)parts.push(trail);
    last=m.index+m[0].length;
  }
  if(last<text.length)parts.push(text.slice(last));
  return <>{parts}</>;
}

/* ── AVATAR UPLOAD ── */
function AvatarUpload({user,size=72,radius=18,onUpload,hint=false}){
  // уменьшаем фото до маленькой превьюшки (256px, jpeg) — иначе большие фото
  // переполняют хранилище и ломают сохранение профиля/объявлений
  const handle=e=>{
    const f=e.target.files?.[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const M=256;let{width:w,height:h}=img;
        if(w>h){if(w>M){h=h*M/w;w=M}}else{if(h>M){w=w*M/h;h=M}}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        try{onUpload(c.toDataURL('image/jpeg',0.82))}catch{onUpload(rd.result)}
      };
      img.onerror=()=>onUpload(rd.result);
      img.src=rd.result;
    };
    rd.readAsDataURL(f);
  };
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:7}}>
      <div className='aup' style={{width:size,height:size,borderRadius:radius}}>
        <Avatar user={user} size={size} radius={radius}/>
        <div className='aup-ov' style={{borderRadius:radius}}>
          <Icon n='camera' style={{color:'#fff',fontSize:20}}/>
          <span style={{fontFamily:'var(--mono)',fontSize:9,color:'rgba(255,255,255,.75)',letterSpacing:'.05em'}}>загрузить</span>
        </div>
        <input type='file' accept='image/*' onChange={handle}/>
      </div>
      {hint&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted2)',letterSpacing:'.05em',textAlign:'center'}}>нажми, чтобы загрузить фото</span>}
    </div>
  );
}

function RolesPicker({game,selected,onChange}){

  const ref=useRef();
  const togglePreset=r=>{
    if(selected.includes(r)) onChange(selected.filter(x=>x!==r));

  };
  const addCustom=e=>{
    if((e.key==='Enter'||e.key===',')&&inp.trim()){
      e.preventDefault();const v=inp.trim().replace(/,$/,'');
      if(v&&!selected.includes(v))onChange([...selected,v]);

    <div className='role-pick-wrap'>
      {preset.length>0&&<div className='role-chips'>
        {preset.map(r=><button key={r} type='button' className={'role-chip'+(selected.includes(r)?' sel':'')} onClick={()=>togglePreset(r)}>{r}</button>)}

/* ── RADAR ── */
function RadarSvg({axes,values,size=80}){
  const cx=size/2,cy=size/2,r=size*.38,n=axes.length;
  const pts=axes.map((_,i)=>{const a=(i/n)*2*Math.PI-Math.PI/2,rr=((values[i]||5)/10)*r;return[cx+rr*Math.cos(a),cy+rr*Math.sin(a)]});
  const grids=[.33,.66,1].map(f=>{const gp=axes.map((_,i)=>{const a=(i/n)*2*Math.PI-Math.PI/2;return[cx+f*r*Math.cos(a),cy+f*r*Math.sin(a)].join(',')}).join(' ');return<polygon key={f} points={gp} fill='none' stroke='#22222c' strokeWidth='1'/>});
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{flexShrink:0}}>
      <defs><linearGradient id='rg' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stopColor='#FF5C7A'/><stop offset='1' stopColor='#7C6CFF'/></linearGradient></defs>
      {grids}
      {axes.map((_,i)=>{const a=(i/n)*2*Math.PI-Math.PI/2;return<line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke='#22222c' strokeWidth='1'/>})}
      <polygon points={pts.map(p=>p.join(',')).join(' ')} fill='rgba(255,92,122,.14)' stroke='url(#rg)' strokeWidth='1.5' strokeLinejoin='round'/>
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r='2.6' fill={axes[i]?.color||'#FF5C7A'}/>)}
    </svg>
  );
}

/* ── ONBOARDING ── */
function Onboarding({onDone,onBack}){
  const[step,setStep]=useState(0);
  const[nick,setNick]=useState('');
  const[avatar,setAvatar]=useState(null);
  const[games,setGames]=useState([{game:'Valorant',roles:[]}]);
  const[axes,setAxes]=useState(DA.map(a=>({...a})));
  const[vals,setVals]=useState([6,6,6,6]);
  const[err,setErr]=useState('');

  const next=()=>{
    if(step===0){
      if(!nick.trim()){setErr('Введи никнейм');return}
      const taken=ls.list('gv:u:').map(k=>ls.get(k)).some(u=>u&&u.nickname.toLowerCase()===nick.trim().toLowerCase());
      if(taken){setErr('Такой ник уже занят — выбери другой');return}
    }
    setErr('');setStep(s=>s+1);
  };
  const done=()=>{
    const id=uid();
    const user={id,nickname:nick.trim(),avatar,games,radarAxes:axes,radarValues:vals,
      radar:Object.fromEntries(axes.map((a,i)=>[a.key,vals[i]])),createdAt:now()};
    ls.set('gv:me',user);ls.set('gv:u:'+id,user);
    ls.set('gv:op:'+id+':'+new Date().toDateString(),0); // у нового аккаунта всегда полная энергия дропа
    onDone(user);
  };
  const back=()=>{if(step===0){onBack&&onBack()}else setStep(s=>s-1)};

  return(
    <div className='ob'>
      <div className='ob-b'>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:2}}>

/* ── CHAT helpers: snapshot участников, чтобы имя/аватар были видны всегда ── */
function makeChat(me,target){
  const cid=[me.id,target.id].sort().join('_');
  return {id:cid,participants:[me.id,target.id],
    peers:{[me.id]:{id:me.id,nickname:me.nickname,avatar:me.avatar||null},
           [target.id]:{id:target.id,nickname:target.nickname,avatar:target.avatar||null}},
    lastMsg:'',lastTs:now(),createdAt:now()};
}
function ensureChat(me,target,chats,setChats){
  const cid=[me.id,target.id].sort().join('_');
  if(chats.find(c=>c.id===cid))return cid;
  const nc=makeChat(me,target);
  const upd=[...chats,nc];setChats(upd);ls.set('gv:ch:'+me.id,upd);
  const tc=ls.get('gv:ch:'+target.id)||[];
  if(!tc.find(c=>c.id===cid))ls.set('gv:ch:'+target.id,[...tc,nc]);
  return cid;
}

/* ── CHATS ── */
function ChatsScreen({me,users,chats,setChats,openChatId,clearOpenChat,mobile,startChat}){
  const[activeId,setActiveId]=useState(null);
  const[msgs,setMsgs]=useState({});
  const[input,setInput]=useState('');
  const[chatOpen,setChatOpen]=useState(false);
  const[viewUser,setViewUser]=useState(null);
  const endRef=useRef(null);
  const msgsRef=useRef(null);
  const pollRef=useRef(null);
  const inpRef=useRef(null);

  const loadMsgs=useCallback(cid=>{const m=ls.get('gv:ms:'+cid)||[];setMsgs(prev=>({...prev,[cid]:m}))},[]);

  // открыть конкретный чат по запросу извне (из доски/событий)
  useEffect(()=>{
    if(openChatId){
      const cid=[me.id,openChatId].sort().join('_');
      setActiveId(cid);setChatOpen(true);loadMsgs(cid);clearOpenChat&&clearOpenChat();
    }
  },[openChatId]);

  useEffect(()=>{
    if(!activeId)return;
    loadMsgs(activeId);
    clearInterval(pollRef.current);
    pollRef.current=setInterval(()=>loadMsgs(activeId),1500);
    return()=>clearInterval(pollRef.current);
  },[activeId,loadMsgs]);

  // прокрутка только внутри области сообщений (не дёргает всю страницу)
  const prevActive=useRef(null);
  useEffect(()=>{
    const el=msgsRef.current;if(!el)return;
    const instant=prevActive.current!==activeId; // при открытии/смене чата — мгновенно, без анимации
    prevActive.current=activeId;
    el.scrollTo({top:el.scrollHeight,behavior:instant?'auto':'smooth'});
  },[msgs,activeId]);

  const send=()=>{
    if(!input.trim()||!activeId)return;
    const m={id:uid(),from:me.id,text:input.trim(),ts:now()};
    const cur=[...(msgs[activeId]||[]),m];
    setMsgs(prev=>({...prev,[activeId]:cur}));
    ls.set('gv:ms:'+activeId,cur);
    const upd=chats.map(c=>c.id===activeId?{...c,lastMsg:m.text,lastTs:m.ts}:c);
    setChats(upd);ls.set('gv:ch:'+me.id,upd);
    // зеркалим последнее сообщение и собеседнику
    const ch=chats.find(c=>c.id===activeId);
    const oid=ch?.participants?.find(p=>p!==me.id);
    if(oid){const tc=(ls.get('gv:ch:'+oid)||[]).map(c=>c.id===activeId?{...c,lastMsg:m.text,lastTs:m.ts}:c);ls.set('gv:ch:'+oid,tc)}
    setInput('');inpRef.current?.focus();
  };

  // имя/аватар собеседника: live-юзер -> снапшот в чате -> заглушка
  const getOther=chat=>{
    const oid=chat.participants?.find(p=>p!==me.id);
    return users[oid]||chat.peers?.[oid]||{id:oid||'?',nickname:'игрок'};
  };
  const sorted=[...chats].sort((a,b)=>(b.lastTs||0)-(a.lastTs||0));
  const curMsgs=activeId?(msgs[activeId]||[]):[];
  const aChat=chats.find(c=>c.id===activeId);
  const aOther=aChat?getOther(aChat):null;

  return(
    <div className={'chat-wrap'+(mobile?' mob':'')+(chatOpen?' chat-open':'')} style={{height:'100%'}}>
      <div className='chat-list'>
        <div style={{padding:'14px 16px 10px',fontFamily:'var(--mono)',fontSize:10,color:'var(--muted2)',letterSpacing:'.16em',textTransform:'uppercase',borderBottom:'1px solid var(--bd)'}}>чаты · {chats.length}</div>
        {sorted.length===0
          ?<div className='emp' style={{paddingTop:48}}><div className='emp-ic'><Icon n='message-2'/></div><p>пока нет чатов<br/>найди тиммейта в поиске</p></div>
          :sorted.map(c=>{const ot=getOther(c);return(
            <div key={c.id} className={'ci'+(c.id===activeId?' on':'')} onClick={()=>{setActiveId(c.id);setChatOpen(true);loadMsgs(c.id)}}>
              <Avatar user={ot} size={44} radius={13}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:14,fontWeight:600}}>{ot.nickname}</span></div>
                <div style={{fontSize:12.5,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginTop:2}}>{c.lastMsg||'нет сообщений'}</div>
              </div>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted2)',flexShrink:0}}>{c.lastTs?fmtAgo(c.lastTs):''}</div>
            </div>
          )})}
      </div>
      <div className='chat-conv'>
        {!aOther?<div className='emp' style={{margin:'auto'}}><div className='emp-ic'><Icon n='message-circle'/></div><p>выбери чат, чтобы начать общение</p></div>:<>
          <div className='chat-hdr'>
            {mobile&&<button className='btn btn-g btn-sm' onClick={()=>setChatOpen(false)}>Назад</button>}
            <div className='chat-hdr-info' style={{display:'flex',alignItems:'center',gap:11}} onClick={()=>setViewUser(aOther)}>
              <Avatar user={aOther} size={38} radius={11}/>
              <div style={{minWidth:0}}><div className='chat-hdr-name'>{aOther.nickname}</div><div style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:500,color:'var(--muted2)',marginTop:2}}>нажми, чтобы открыть профиль</div></div>
            </div>
            <button className='btn btn-g btn-sm' style={{marginLeft:'auto'}} onClick={()=>setViewUser(aOther)}>Профиль</button>
          </div>
          <div className='msgs-area' ref={msgsRef}>
            {curMsgs.length===0&&<div style={{textAlign:'center',color:'var(--muted2)',fontSize:12,marginTop:24}}>Начало чата — скажи привет 👋</div>}
            {curMsgs.map((m,i)=>{
              const mine=m.from===me.id;
              const prev=curMsgs[i-1];
              const grp=prev&&prev.from===m.from&&(m.ts-prev.ts<120000);
              return(
                <div key={m.id} className={'mr'+(mine?' me':'')+(grp?' grp':'')}>
                  {!mine&&<div style={{width:28,flexShrink:0}}>{!grp&&<Avatar user={aOther} size={28} radius={9}/>}</div>}
                  <div className='mr-col'>
                    <div className={'bub'+(mine?' mine':' them')}><Linkify text={m.text}/></div>
                    <div className='mtime' style={{textAlign:mine?'right':'left'}}>{fmtTime(m.ts)}</div>
                  </div>
                </div>
              );
            })}
            <div ref={endRef}/>
          </div>
          <div className='chat-inp-row'>
            <textarea ref={inpRef} className='chat-inp' placeholder='Сообщение... (Enter — отправить)' rows={1} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}}/>
            <button className='btn btn-p' style={{height:44,flexShrink:0,paddingLeft:16,paddingRight:16}} onClick={send}><Icon n='send' style={{fontSize:18}}/></button>
          </div>
        </>}
      </div>
      {viewUser&&<UserModal user={viewUser} onClose={()=>setViewUser(null)} onChat={viewUser.id!==me.id&&startChat?()=>startChat(viewUser):null} selfView={viewUser.id===me.id}/>}
    </div>
  );
}

/* ── ПОИСК ТИММЕЙТОВ (GACHA) ── */
function FindScreen({me,users,chats,setChats,goChat}){
  const[phase,setPhase]=useState('chest');
  const[showTutorial,setShowTutorial]=useState(!ls.get('gv:tut:seen'));
  const[pool,setPool]=useState([]);
  const[idx,setIdx]=useState(0);
  const[left,setLeft]=useState(10);
  const[matched,setMatched]=useState(null);
  const[shaking,setShaking]=useState(false);

  // попытки привязаны к АККАУНТУ (через общий слой данных), а не к устройству
  const opKey=()=>'gv:op:'+me.id+':'+new Date().toDateString();
  useEffect(()=>{const used=+(ls.get(opKey())||0);setLeft(Math.max(0,10-used));},[me.id]);

  const closeTutorial=()=>{ls.set('gv:tut:seen',true);setShowTutorial(false)};
  const decrLeft=()=>{const used=+(ls.get(opKey())||0)+1;ls.set(opKey(),used);setLeft(Math.max(0,10-used))};

  // очки совпадения: общие игры (главное) + близость радара + немного рандома
  const myGames=(me.games||[]).map(g=>g.game);
  const myRadar=me.radarValues||DA.map(a=>me.radar?.[a.key]||5);
  const sharedGames=u=>{const ug=(u.games||[]).map(g=>g.game);return myGames.filter(g=>ug.includes(g))};
  const scoreOf=u=>{
    let s=0;
    s+=sharedGames(u).length*10;                       // общие игры — сильнейший сигнал
    const ur=u.radarValues||DA.map(a=>u.radar?.[a.key]||5);
    let diff=0;for(let i=0;i<Math.min(myRadar.length,ur.length);i++)diff+=Math.abs((myRadar[i]||5)-(ur[i]||5));
    s+=Math.max(0,6-diff/4);                            // чем ближе характер — тем больше очков
    s+=Math.random()*3;                                 // лёгкая перетасовка, чтобы не приедалось
    return s;
  };

  const openChest=()=>{
    if(left<=0)return;
    const real=Object.values(users).filter(u=>u.id!==me.id);
    if(real.length===0){alert('Пока нет других игроков!\nОткрой приложение в другой вкладке и зарегистрируй второй аккаунт для теста, или зови друзей!');return}
    const src=[...real].sort((a,b)=>scoreOf(b)-scoreOf(a)).slice(0,10);  // подбор по интересам
    setPool(src);setIdx(0);decrLeft();setMatched(null);
    setShaking(true);setTimeout(()=>{setShaking(false);setPhase('cards')},560);
  };

  const next=()=>{if(idx+1>=pool.length)setPhase('done');else setIdx(i=>i+1)};
  const like=()=>{
    const t=pool[idx];
    const mlk=ls.get('gv:lk:'+me.id)||[];
    if(!mlk.includes(t.id))ls.set('gv:lk:'+me.id,[...mlk,t.id]);
    const tlk=ls.get('gv:lk:'+t.id)||[];
    if(tlk.includes(me.id)){
      // взаимный лайк → мэтч: открываем чат и уведомляем обоих
      ensureChat(me,t,chats,setChats);
      const tn=ls.get('gv:no:'+t.id)||[];
      ls.set('gv:no:'+t.id,[{id:uid(),userId:t.id,type:'match',fromUserId:me.id,fromName:me.nickname,fromAvatar:me.avatar||null,read:false,ts:now()},...tn]);
      setMatched(t);
    } else {
      // обычный лайк → уведомление другому игроку
      const tn=ls.get('gv:no:'+t.id)||[];
      ls.set('gv:no:'+t.id,[{id:uid(),userId:t.id,type:'like',fromUserId:me.id,fromName:me.nickname,fromAvatar:me.avatar||null,read:false,ts:now()},...tn]);
    }
    next();
  };

  const cur=pool[idx];
  const curShared=cur?sharedGames(cur):[];
  const ca=cur?.radarAxes||DA;
  const cv=cur?.radarValues||ca.map(a=>cur?.radar?.[a.key]||5);

  return(
    <div className='content-wrap'>
      {showTutorial&&<Tutorial onClose={closeTutorial}/>}
      <div className='ph'>
        <div className='ph-t'>Поиск тиммейтов</div>
        <div style={{display:'flex',alignItems:'center',gap:9}}>
          <button className='btn btn-g btn-sm' onClick={()=>setShowTutorial(true)}>Помощь</button>
          <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--muted2)'}}>дропов: <span style={{color:'var(--pk)',fontWeight:700}}>{left}</span>/10</div>
        </div>
      </div>
      {matched&&<div className='match-b fu'>
        <Avatar user={matched} size={44} radius={13}/>
        <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,fontFamily:'var(--sans)'}}>Мэтч с {matched.nickname}! 🎉</div><div style={{fontSize:13,color:'var(--muted)',marginTop:2}}>Чат уже открыт — напиши первым</div></div>
        <button className='btn btn-p btn-sm' onClick={()=>goChat&&goChat(matched.id)}>Открыть</button>
      </div>}
      <div className='gacha-c'>
        {phase==='chest'&&<>
          <button className={'lootbox-stage'+(left>0?' open-ready':' depleted')} onClick={openChest} disabled={left<=0} aria-label='Открыть дроп'>
            <div className='lootbox-glow'/>
            <div className='lootbox-grid'/>
            <div className='lootbox-ring'/>
            <svg className='chest-svg' width='230' height='230' viewBox='0 0 152 152' style={{animation:shaking?'shake .55s':'chestFloat 4s ease-in-out infinite'}}>
              <defs>
                <linearGradient id='cg' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stopColor='#FF3D7F'/><stop offset='.5' stopColor='#FF5C9A'/><stop offset='1' stopColor='#7C6CFF'/></linearGradient>
                <linearGradient id='cgGold' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stopColor='#FFD66B'/><stop offset='1' stopColor='#FFB454'/></linearGradient>
              </defs>
              <ellipse cx='76' cy='138' rx='46' ry='7' fill='rgba(124,108,255,.25)'/>
              <rect x='16' y='77' width='120' height='59' rx='13' fill='#1a1a24' stroke='url(#cg)' strokeWidth='2'/>
              <rect x='16' y='30' width='120' height='49' rx='13' fill='#23232f' stroke='url(#cg)' strokeWidth='2'/>
              <rect x='55' y='66' width='42' height='22' rx='7' fill='#0f0f16' stroke='url(#cgGold)' strokeWidth='2'/>
              <circle cx='76' cy='77' r='8' fill='#2a1a26' stroke='url(#cgGold)' strokeWidth='2'/>
              <circle cx='76' cy='77' r='3.5' fill='#FFD66B'/>
              <rect x='28' y='49' width='96' height='4' rx='2' fill='#15151c'/>
              <rect x='28' y='49' width={`${(10-left)/10*96}`} height='4' rx='2' fill='url(#cg)'/>
              {[[44,90],[66,90],[88,90],[44,106],[66,106],[88,106]].map(([x,y],i)=><rect key={i} x={x} y={y} width='10' height='10' rx='2' fill='#16161e' stroke='#34343f' strokeWidth='1'/>)}
              <line x1='16' y1='79' x2='136' y2='79' stroke='url(#cg)' strokeWidth='1.5' opacity='.5'/>
            </svg>
            {left>0&&<div className='lootbox-tap'><Icon n='box' style={{fontSize:15}}/> нажми, чтобы открыть</div>}
          </button>
          <div style={{textAlign:'center'}}>
            <div style={{fontFamily:'var(--sans)',fontWeight:700,fontSize:20,color:'#fff',letterSpacing:'-.01em',marginBottom:6}}>Дроп тиммейтов</div>
            <div style={{fontSize:13.5,color:'var(--muted)',lineHeight:1.55,maxWidth:300,margin:'0 auto'}}>Подбираем игроков под твои интересы. Листай, лайкай и лови мэтч.</div>
          </div>
          <div className='drop-tries'>
            {Array.from({length:10}).map((_,i)=><span key={i} className={'drop-pip'+(i<left?' on':'')}/>)}
          </div>
          <div className='lootbox-meta'><Icon n='bolt' style={{color:'var(--amber)'}}/> {left>0?('осталось попыток: '+left+' / 10'):'на сегодня лимит исчерпан — загляни завтра'}</div>
        </>}
        {phase==='cards'&&cur&&<>
          <div className='gp-dots'>{pool.map((_,i)=><div key={i} className='gp-dot' style={{background:i<=idx?'var(--pk)':'#22222c',opacity:i<=idx?1:.4}}/>)}</div>
          <div className='card pop' style={{width:'100%',maxWidth:400}}>
            <div style={{display:'flex',gap:15,marginBottom:16}}>
              <Avatar user={cur} size={60} radius={17}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,flexWrap:'wrap'}}>
                  <div style={{fontSize:17,fontWeight:600,fontFamily:'var(--sans)'}}>{cur.nickname}</div>
                  {curShared.length>0&&<span className='match-pill'><Icon n='bolt' style={{fontSize:11}}/>{curShared.length} {curShared.length===1?'общая игра':'общих игр'}</span>}
                </div>
                <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>{(cur.games||[]).map(g=><span key={g.game} className={'tag '+(curShared.includes(g.game)?'tg-match':'tg')}>{curShared.includes(g.game)&&'★ '}{g.game}</span>)}</div>
                <div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:6}}>{(cur.games||[])[0]?.roles?.slice(0,3).map(r=><span key={r} className='tag tr'>{r}</span>)}</div>
              </div>
            </div>
            <div style={{display:'flex',gap:15,alignItems:'center'}}>
              <RadarSvg axes={ca} values={cv} size={92}/>
              <div style={{flex:1}}>{ca.map((ax,i)=><div key={ax.key} className='rb'><div className='rbn' style={{color:ax.color}}>{ax.label}</div><div className='rbt'><div className='rbf' style={{width:(cv[i]||5)*10+'%',background:ax.color}}/></div><div className='rbv' style={{color:ax.color}}>{cv[i]||5}</div></div>)}</div>
            </div>
          </div>
          <div className='g-actions'>
            <button className='g-skip' onClick={next}>Пропустить</button>
            <button className='g-like' onClick={like}>В отряд</button>
          </div>
          <div className='lootbox-meta'><Icon n='bolt' style={{color:'var(--amber)'}}/> анкета {idx+1} из {pool.length} · осталось дропов: {left}/10</div>
        </>}
        {phase==='done'&&<>
          <div style={{fontSize:46}}>🎮</div>
          <div style={{fontSize:17,fontWeight:700,fontFamily:'var(--sans)'}}>Колода просмотрена!</div>
          <div style={{fontSize:13,color:'var(--muted)'}}>Осталось дропов сегодня: {left}/10</div>
          {left>0&&<button className='btn btn-p' onClick={()=>{setPhase('chest');setMatched(null)}}>Открыть ещё</button>}
        </>}
      </div>
    </div>
  );
}

/* ── NOTIFICATIONS ── */
function NotifsScreen({me,users,notifs,setNotifs,chats,setChats,goChat}){
  const[viewUser,setViewUser]=useState(null);
  const peerFrom=n=>users[n.fromUserId]||{id:n.fromUserId,nickname:n.fromName||'игрок',avatar:n.fromAvatar||null};
  const startChat=t=>{ensureChat(me,t,chats,setChats);goChat&&goChat(t.id)};
  // помечаем все как прочитанные при открытии экрана — значок «новых» сразу пропадает
  useEffect(()=>{
    const cur=ls.get('gv:no:'+me.id)||[];
    if(cur.some(n=>!n.read)){const upd=cur.map(n=>({...n,read:true}));ls.set('gv:no:'+me.id,upd);setNotifs(upd);}
  },[]);
  const writeNotifs=upd=>{ls.set('gv:no:'+me.id,upd);setNotifs(upd);};
  const accept=n=>{const t=peerFrom(n);ensureChat(me,t,chats,setChats);writeNotifs((ls.get('gv:no:'+me.id)||[]).map(x=>x.id===n.id?{...x,accepted:true,read:true}:x));goChat&&goChat(n.fromUserId)};
  const likeback=n=>{const t=peerFrom(n);ensureChat(me,t,chats,setChats);const mn={id:uid(),userId:n.fromUserId,type:'match',fromUserId:me.id,fromName:me.nickname,fromAvatar:me.avatar||null,read:false,ts:now()};const tn=ls.get('gv:no:'+n.fromUserId)||[];ls.set('gv:no:'+n.fromUserId,[mn,...tn]);writeNotifs((ls.get('gv:no:'+me.id)||[]).map(x=>x.id===n.id?{...x,likedback:true,read:true}:x))};
  const dismiss=id=>{writeNotifs((ls.get('gv:no:'+me.id)||[]).map(x=>x.id===id?{...x,dismissed:true,read:true}:x))};
  const visible=notifs.filter(n=>!n.dismissed);
  const unread=notifs.filter(n=>!n.read&&!n.dismissed).length;
  return(
    <div className='content-wrap'>
      <div className='ph'><div className='ph-t'>Уведомления</div>{visible.length>0&&<button className='btn btn-g btn-sm' onClick={()=>writeNotifs((ls.get('gv:no:'+me.id)||[]).map(n=>({...n,dismissed:true,read:true})))}>Очистить всё</button>}</div>
      {visible.length===0?<div className='emp'><div className='emp-ic'><Icon n='bell'/></div><p>пока тихо<br/>здесь появятся заявки и мэтчи</p></div>
      :visible.map(n=>{
        const from=peerFrom(n);
        let badge='user-plus',bbg='var(--pk)',text=null;
        if(n.type==='application')text=<><span className='notif-name' onClick={()=>setViewUser(from)}>{from.nickname}</span> хочет в твой отряд ({n.listingGame})</>;
        if(n.type==='like'){badge='heart-filled';bbg='var(--purple)';text=<><span className='notif-name' onClick={()=>setViewUser(from)}>{from.nickname}</span> лайкнул тебя в поиске</>}
        if(n.type==='match'){badge='confetti';bbg='var(--green)';text=<>Мэтч с <span className='notif-name' onClick={()=>setViewUser(from)}>{from.nickname}</span>! 🎉</>}
        const isUnread=!n.read;
        return(
          <div key={n.id} className={'notif-row'+(isUnread?' unread':'')}>
            <div className='notif-icon' style={{background:'transparent',padding:0}} onClick={()=>setViewUser(from)}>
              <Avatar user={from} size={44} radius={13}/>
              <div style={{position:'absolute',bottom:-3,right:-3,width:18,height:18,borderRadius:6,background:bbg,display:'flex',alignItems:'center',justifyContent:'center',border:'2px solid var(--card)'}}><Icon n={badge} style={{fontSize:10,color:'#fff'}}/></div>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,color:'var(--muted)',lineHeight:1.5,marginBottom:10,paddingRight:24}}>{text}</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:4}}>
                <button className='btn btn-g btn-sm' onClick={()=>setViewUser(from)}>Профиль</button>
                {n.type==='application'&&!n.accepted&&<><button className='btn btn-p btn-sm' onClick={()=>accept(n)}>Принять</button><button className='btn btn-g btn-sm' onClick={()=>dismiss(n.id)}>Отклонить</button></>}
                {n.type==='application'&&n.accepted&&<button className='btn btn-p btn-sm' onClick={()=>startChat(from)}>Чат</button>}
                {n.type==='like'&&!n.likedback&&<><button className='btn btn-p btn-sm' onClick={()=>likeback(n)}>Лайк в ответ</button><button className='btn btn-g btn-sm' onClick={()=>dismiss(n.id)}>Пропустить</button></>}
                {n.type==='like'&&n.likedback&&<button className='btn btn-p btn-sm' onClick={()=>startChat(from)}>Чат</button>}
                {n.type==='match'&&<button className='btn btn-p btn-sm' onClick={()=>{ensureChat(me,from,chats,setChats);goChat&&goChat(n.fromUserId)}}>Открыть чат</button>}
              </div>
              <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--muted2)',marginTop:6}}>{fmtAgo(n.ts)}</div>
            </div>
            <button className='notif-x' onClick={()=>dismiss(n.id)} title='Скрыть'><Icon n='x' style={{fontSize:14}}/></button>
          </div>
        );
      })}
      {viewUser&&<UserModal user={viewUser} onClose={()=>setViewUser(null)} onChat={()=>startChat(viewUser)}/>}
    </div>
  );
}

/* ── PROFILE ── */
function ProfileScreen({me,setMe,onLogout,onDelete,chats,mobile}){
  const[editing,setEditing]=useState(false);
  const[confirmDel,setConfirmDel]=useState(false);
  const[form,setForm]=useState({nickname:me.nickname,avatar:me.avatar||null,games:me.games||[],axes:(me.radarAxes||DA).map(a=>({...a})),vals:me.radarValues||(me.radarAxes||DA).map(a=>me.radar?.[a.key]||5)});
  const save=()=>{
    if(!form.nickname.trim())return;
    const upd={...me,nickname:form.nickname.trim(),avatar:form.avatar,games:form.games,radarAxes:form.axes,radarValues:form.vals,radar:Object.fromEntries(form.axes.map((a,i)=>[a.key,form.vals[i]]))};
    setMe(upd);ls.set('gv:me',upd);ls.set('gv:u:'+me.id,upd);setEditing(false);
  };
  const axes=me.radarAxes||DA;
  const vals=me.radarValues||axes.map(a=>me.radar?.[a.key]||5);
  const gamesCount=(me.games||[]).length;
  const rolesCount=(me.games||[]).reduce((s,g)=>s+(g.roles?.length||0),0);
  const chatCount=(chats||[]).length;

  if(editing)return(
    <div className='content-wrap'>
      <div className='ph'><div className='ph-t'>Редактировать</div><button className='btn btn-g btn-sm' onClick={()=>setEditing(false)}>Отмена</button></div>
      <div style={{display:'flex',alignItems:'flex-start',gap:18,marginBottom:22}}>
        <AvatarUpload user={{...me,nickname:form.nickname,avatar:form.avatar}} size={72} radius={20} onUpload={s=>setForm(f=>({...f,avatar:s}))} hint={true}/>
        <div style={{flex:1}}><label className='fl'>Никнейм</label><input value={form.nickname} onChange={e=>setForm(f=>({...f,nickname:e.target.value}))}/></div>
      </div>

        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <select value={g.game} onChange={e=>{const ng=[...form.games];ng[i]={...ng[i],game:e.target.value,roles:[]};setForm(f=>({...f,games:ng}))}} style={{flex:1}}>{GAMES.map(gm=><option key={gm}>{gm}</option>)}</select>
          {form.games.length>1&&<button className='btn btn-g btn-sm' style={{padding:'8px 11px'}} onClick={()=>setForm(f=>({...f,games:f.games.filter((_,j)=>j!==i)}))}><Icon n='trash'/></button>}
        </div>
        <label className='fl'>Роли</label>
        <RolesPicker game={g.game} selected={g.roles} onChange={v=>{const ng=[...form.games];ng[i]={...ng[i],roles:v};setForm(f=>({...f,games:ng}))}}/>
      </div>)}
      <button className='btn btn-g btn-sm btn-fw' style={{marginBottom:22}} onClick={()=>setForm(f=>({...f,games:[...f.games,{game:'CS2',roles:[]}]}))}>Добавить игру</button>
      <div className='sl'>радар характера</div>
      <div style={{display:'flex',gap:16,marginBottom:14,alignItems:'center'}}><RadarSvg axes={form.axes} values={form.vals} size={96}/><div style={{flex:1}}><RadarSliders axes={form.axes} values={form.vals} onChange={v=>setForm(f=>({...f,vals:v}))}/></div></div>
      <div className='card2' style={{marginBottom:22}}><AxisEditor axes={form.axes} onChange={a=>setForm(f=>({...f,axes:a}))}/></div>
      <button className='btn btn-p btn-fw' onClick={save}>Сохранить изменения</button>
    </div>
  );

  return(
    <div className={'content-wrap'+(mobile?' prof-compact':'')}>
      <div className='ph'><div className='ph-t'>Профиль</div><button className='btn btn-g btn-sm' onClick={()=>setEditing(true)}>Изменить</button></div>
      <div className='prof-hero'>
        <Avatar user={me} size={mobile?60:72} radius={mobile?18:21}/>
        <div style={{flex:1,minWidth:0,position:'relative',zIndex:1}}>
          <div style={{fontSize:20,fontWeight:700,fontFamily:'var(--sans)',letterSpacing:'-.01em'}}>{me.nickname}</div>
          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted2)',letterSpacing:'.06em',marginTop:4}}>участник с {new Date(me.createdAt).toLocaleDateString('ru')}</div>
          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--green)',marginTop:4}}>● онлайн</div>
        </div>
      </div>
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        <div className='stat-card'><div className='stat-val'>{gamesCount}</div><div className='stat-label'>игр</div></div>
        <div className='stat-card'><div className='stat-val'>{rolesCount}</div><div className='stat-label'>ролей</div></div>
        <div className='stat-card'><div className='stat-val'>{chatCount}</div><div className='stat-label'>чатов</div></div>
      </div>
      <div className='card' style={{marginBottom:14}}>
        <div className='sl'>игры и роли</div>
        {gamesCount===0&&<span style={{fontSize:12,color:'var(--muted2)',fontFamily:'var(--mono)'}}>не указаны</span>}
        {(me.games||[]).map((g,i)=>(
          <div key={i} style={{marginBottom:i<(me.games.length-1)?16:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
              <span className='tag tg'>{g.game}</span>
            </div>
            {g.roles?.length>0
              ?<div style={{display:'flex',gap:5,flexWrap:'wrap',paddingLeft:2}}>{g.roles.map(r=><span key={r} className='tag tr'>{r}</span>)}</div>
              :<span style={{fontSize:12,color:'var(--muted2)',fontFamily:'var(--mono)',paddingLeft:2}}>роли не указаны</span>

        <div className='sl'>радар характера</div>

          <RadarSvg axes={axes} values={vals} size={mobile?84:96}/>
          <div style={{flex:1}}>{axes.map((ax,i)=><div key={ax.key} className='rb'><div className='rbn' style={{color:ax.color}}>{ax.label}</div><div className='rbt'><div className='rbf' style={{width:vals[i]*10+'%',background:ax.color}}/></div><div className='rbv' style={{color:ax.color}}>{vals[i]}</div></div>)}</div>
        </div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button className='btn btn-g' style={{flex:1}} onClick={onLogout}>Выйти</button>
        <button className='btn btn-d' style={{flex:1}} onClick={()=>setConfirmDel(true)}>Удалить аккаунт</button>
      </div>
      {confirmDel&&<Modal title='Удалить аккаунт?' onClose={()=>setConfirmDel(false)} maxW={400}>
        <p style={{fontSize:14,color:'var(--muted)',lineHeight:1.6,marginBottom:20}}>Это действие необратимо. Профиль, чаты, объявления и история лайков будут удалены навсегда.</p>
        <div style={{display:'flex',gap:8}}>
          <button className='btn btn-g' style={{flex:1}} onClick={()=>setConfirmDel(false)}>Отмена</button>
          <button className='btn btn-d' style={{flex:1,borderColor:'var(--pk)'}} onClick={onDelete}>Удалить навсегда</button>
        </div>
      </Modal>}
    </div>
  );
}

/* ── ROOT ── */
function App(){
  const[auth,setAuth]=useState('loading');
  const[me,setMe]=useState(null);
  const[tab,setTab]=useState('board');
  const[users,setUsers]=useState({});
  const[listings,setListings]=useState([]);
  const[chats,setChats]=useState([]);
  const[notifs,setNotifs]=useState([]);
  const[openChatId,setOpenChatId]=useState(null);
  const[profileUser,setProfileUser]=useState(null);
  // PREVIEW=true показывает панель «Десктоп/Мобилка» + рамку телефона (для просмотра обеих версий).
  // В реальном деплое (без ?preview) панели нет: версия выбирается сама по ширине экрана.
  const PREVIEW=(typeof window!=='undefined')&&(/[?&]preview\b/.test(window.location.search)||/preview/i.test(window.location.pathname));
  const detectMobile=()=>{
    if(typeof window==='undefined')return false;
    const w=window.innerWidth;
    if(w<=768)return true;
    // большой телефон/ландшафт: трогабельный экран с грубым указателем и не очень широкий
    const coarse=window.matchMedia&&window.matchMedia('(pointer:coarse)').matches;
    const touch=('ontouchstart'in window)||navigator.maxTouchPoints>0;
    return (coarse||touch)&&w<=1024;
  };
  const[vw,setVw]=useState(typeof window!=='undefined'?window.innerWidth:1280);
  const[pvMode,setPvMode]=useState(detectMobile()?'mobile':'desktop');
  useEffect(()=>{
    if(PREVIEW)return; // в превью режим выбирается кнопками
    const onR=()=>setVw(window.innerWidth);
    window.addEventListener('resize',onR);return()=>window.removeEventListener('resize',onR);
  },[PREVIEW]);
  const isMobile=PREVIEW?(pvMode==='mobile'):detectMobile();
  const pingRef=useRef(null);
  const pollRef=useRef(null);
  const[tick,setTick]=useState(0);
  useEffect(()=>{ onCacheChange=()=>setTick(t=>t+1); initBackend(); return()=>{onCacheChange=null}; },[]);
  useEffect(()=>{ if(me&&auth==='app') loadAll(me); },[tick]);

  useEffect(()=>{const saved=ls.get('gv:me');if(saved){setMe(saved);loadAll(saved);setAuth('app')}else setAuth('loggedOut')},[]);

  const loadAll=my=>{
    setChats(ls.get('gv:ch:'+my.id)||[]);
    setNotifs(ls.get('gv:no:'+my.id)||[]);
    setListings((ls.get('gv:li')||[]).filter(l=>l.status==='active'&&l.expiresAt>now()));
    refreshUsers(my);
  };

  const refreshUsers=my=>{
    const all={};
    ls.list('gv:u:').forEach(k=>{const u=ls.get(k);if(u)all[u.id]=u});
    Object.keys(all).forEach(id=>{all[id]._online=isOnline(id)});
    if(my)all[my.id]={...all[my.id]||my,_online:true};
    setUsers(all);
  };

  useEffect(()=>{
    if(!me||auth!=='app')return;
    pingOnline(me.id);
    pingRef.current=setInterval(()=>pingOnline(me.id),28000);
    pollRef.current=setInterval(()=>{
      setChats(ls.get('gv:ch:'+me.id)||[]);
      setNotifs(ls.get('gv:no:'+me.id)||[]);
      setListings((ls.get('gv:li')||[]).filter(l=>l.status==='active'&&l.expiresAt>now()));
      refreshUsers(me);
    },6000);
    return()=>{clearInterval(pingRef.current);clearInterval(pollRef.current)};
  },[me?.id,auth]);

  const handleLogin=user=>{setMe(user);loadAll(user);setAuth('app');setTab('board')};
  const handleLogout=()=>{ls.del('gv:me');setMe(null);setAuth('loggedOut')};
  const handleDelete=()=>{
    if(!me)return;
    ls.del('gv:u:'+me.id);ls.del('gv:me');ls.del('gv:on:'+me.id);
    ls.del('gv:ch:'+me.id);ls.del('gv:no:'+me.id);ls.del('gv:lk:'+me.id);
    // убрать мои объявления с общей доски
    const li=(ls.get('gv:li')||[]).filter(l=>l.userId!==me.id);ls.set('gv:li',li);
    setMe(null);setChats([]);setNotifs([]);setListings([]);setUsers({});
    setAuth('loggedOut');
  };

  const goChat=id=>{setOpenChatId(id);setTab('chats')};

  const unread=notifs.filter(n=>!n.read&&!n.dismissed).length;

  const startChatGlobal=target=>{ensureChat(me,target,chats,setChats);goChat&&goChat(target.id)};
  const renderContent=(mobile=false)=>{
    switch(tab){
      case'chats':  return<ChatsScreen me={me} users={users} chats={chats} setChats={setChats} openChatId={openChatId} clearOpenChat={()=>setOpenChatId(null)} mobile={mobile} startChat={startChatGlobal}/>;
      case'board':  return<BoardScreen me={me} users={users} listings={listings} setListings={setListings} chats={chats} setChats={setChats} goChat={goChat}/>;
      case'find':   return<FindScreen me={me} users={users} chats={chats} setChats={setChats} goChat={goChat}/>;
      case'notifs': return<NotifsScreen me={me} users={users} notifs={notifs} setNotifs={setNotifs} chats={chats} setChats={setChats} goChat={goChat}/>;
      case'profile':return<ProfileScreen me={me} setMe={setMe} onLogout={handleLogout} onDelete={handleDelete} chats={chats} mobile={mobile}/>;
    }
  };

  if(!CONFIGURED)return(
    <div className='ob'><div className='ob-b' style={{maxWidth:520}}>
      <div className='logo' style={{fontSize:20,marginBottom:8}}>ГГВП</div>
      <div className='ob-sub' style={{marginBottom:20}}>БЭКЕНД-ВЕРСИЯ · НУЖНА НАСТРОЙКА</div>
      <div style={{fontSize:14,color:'var(--white)',lineHeight:1.6,marginBottom:14,fontFamily:'var(--sans)',fontWeight:600}}>Подключи бесплатную базу Supabase</div>
      <div style={{fontSize:13.5,color:'var(--muted)',lineHeight:1.8}}>
        1. Зарегистрируйся на <span style={{color:'var(--cy-soft)'}}>supabase.com</span>, создай проект.<br/>
        2. В <b style={{color:'#fff'}}>SQL Editor</b> выполни скрипт из <b style={{color:'#fff'}}>КАК_ЗАПУСТИТЬ.md</b>.<br/>
        3. В <b style={{color:'#fff'}}>Settings → API</b> скопируй <b style={{color:'#fff'}}>Project URL</b> и <b style={{color:'#fff'}}>anon key</b>.<br/>
        4. Вставь их в начало файла (SUPABASE_URL и SUPABASE_ANON_KEY) и перезагрузи.
      </div>
      <div style={{marginTop:18,padding:14,borderRadius:12,background:'var(--card2)',border:'1px solid var(--bd)',fontFamily:'var(--mono)',fontSize:12,color:'var(--muted)',lineHeight:1.7}}>Полная пошаговая инструкция — в файле КАК_ЗАПУСТИТЬ.md из архива.</div>
    </div></div>
  );
  if(auth==='loading')return<div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--mono)',color:'var(--muted2)',fontSize:12,letterSpacing:'.12em'}}>загрузка...</div>;
  if(auth==='loggedOut')return<LoginScreen onLogin={handleLogin} onRegister={()=>setAuth('onboarding')}/>;
  if(auth==='onboarding')return<Onboarding onDone={u=>{setMe(u);loadAll(u);setAuth('app');setTab('board')}} onBack={()=>setAuth('loggedOut')}/>;

  const PvBar=()=>(PREVIEW?
    <div className='pv-bar'>
      <span className='pv-lbl'>ПРЕДПРОСМОТР:</span>
      <button className={'pv-btn'+(pvMode==='desktop'?' on':'')} onClick={()=>setPvMode('desktop')}>Десктоп</button>
      <button className={'pv-btn'+(pvMode==='mobile'?' on':'')} onClick={()=>setPvMode('mobile')}>Мобилка</button>
    </div>:null
  );

  /* ── MOBILE ── (в превью — в рамке телефона; в реале — на весь экран)
     ВАЖНО: это обычный JSX в дереве App, а не вложенный компонент —
     иначе React пересоздавал бы поддерево на каждый рендер и сбрасывал
     состояние экранов (из-за этого раньше «вылетали» доска/поиск). */
  const chatFull=tab==='chats';
  const mobileView=(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      {!chatFull&&<div style={{display:'flex',height:56,padding:'0 16px',alignItems:'center',borderBottom:'1px solid var(--bd)',background:'var(--dark2)',flexShrink:0}}>
        <div className='logo' style={{fontSize:15}}>ГГВП</div>
      </div>}
      <div style={{flex:1,overflow:chatFull?'hidden':'auto',padding:chatFull?0:'16px 15px 6px',minHeight:0}}>
        {renderContent(true)}
      </div>
      <div className='mnav'>
        {NAV.map(n=>{
          const on=tab===n.key;
          const showDot=(n.key==='notifs'&&unread>0)||(n.dot&&!on);
          return(
            <button key={n.key} className={'mnav-i'+(on?' on':'')} onClick={()=>{setTab(n.key);if(n.key!=='chats')setOpenChatId(null)}}>
              <span className='mnav-ic'>
                <Icon n={n.icon} style={{fontSize:23}}/>
                {showDot&&<span className='mnav-dot'/>}
              </span>
              {on&&<span className='mnav-lbl'>{n.label}</span>}
            </button>
          );
        })}
      </div>
    </div>
  );

  if(isMobile){
    if(!PREVIEW)return <div className='mobile-root'>{mobileView}{profileUser&&<UserModal user={profileUser} onClose={()=>setProfileUser(null)} onChat={()=>{startChatGlobal(profileUser);setProfileUser(null)}}/>}</div>;
    return(
      <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#050507',overflow:'hidden'}}>
        <PvBar/>
        <div style={{flex:1,display:'flex',justifyContent:'center',alignItems:'flex-start',padding:'20px 0',overflowY:'auto'}}>
          <div style={{width:390,height:800,borderRadius:42,overflow:'hidden',border:'1.5px solid #2a2a34',boxShadow:'0 24px 80px rgba(0,0,0,.9)',background:'var(--dark)',display:'flex',flexDirection:'column',flexShrink:0}}>
            {mobileView}
          </div>
        </div>
        {profileUser&&<UserModal user={profileUser} onClose={()=>setProfileUser(null)} onChat={()=>{startChatGlobal(profileUser);setProfileUser(null)}}/>}
      </div>
    );
  }

  /* ── DESKTOP ── */
  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <PvBar/>
      <div style={{flex:1,overflow:'hidden',display:'flex'}}>
        <div className='app-shell' style={{flex:1}}>
          <aside className='sb'>
            <div className='sb-head'>
              <div className='logo' style={{fontSize:17}}>ГГВП</div>
              <div className='sb-tagline'>поиск тиммейтов</div>
            </div>
            <nav className='sb-nav'>
              {NAV.map(n=>(
                <button key={n.key} className={'nb'+(tab===n.key?' on':'')} onClick={()=>{setTab(n.key);if(n.key!=='chats')setOpenChatId(null)}}>
                  <span className='nb-ic'><Icon n={n.icon} style={{fontSize:19}}/></span>{n.label}
                  {n.key==='notifs'&&unread>0&&<span className='nb-badge'>{unread}</span>}
                  {n.dot&&<span className='nb-dot'/>}
                </button>
              ))}
            </nav>
            <div className='sb-cta' onClick={()=>setTab('find')}>
              <div className='sb-cta-glow'/>
              <div style={{position:'relative',zIndex:1}}>
                <div className='sb-cta-ic'><Icon n='cards'/></div>
                <div className='sb-cta-t'>Дроп тиммейтов</div>
                <div className='sb-cta-s'>Открой подборку игроков и найди мэтч</div>
                <div className='sb-cta-btn'>Открыть <Icon n='arrow-right' style={{fontSize:13}}/></div>
              </div>
            </div>
          </aside>

          <div className='main-col'>
            <div className='desk-hdr'>
              <div className='desk-hdr-title'><span className='tdot'/>{TITLES[tab]||''}</div>
              <div className='desk-hdr-right'>
                {unread>0&&<button className='btn btn-g btn-sm' onClick={()=>setTab('notifs')}><Icon n='bell'/> <span className='badge'>{unread}</span></button>}
                {tab!=='profile'&&<div style={{display:'flex',alignItems:'center',gap:10,padding:'7px 13px',borderRadius:12,cursor:'pointer',transition:'background .15s',background:'var(--card)',border:'1px solid var(--bd)'}} onClick={()=>setTab('profile')} onMouseEnter={e=>e.currentTarget.style.background='var(--card2)'} onMouseLeave={e=>e.currentTarget.style.background='var(--card)'}>
                  <Avatar user={me} size={30} radius={9}/>
                  <div><div style={{fontSize:13,fontWeight:600,lineHeight:1.2}}>{me.nickname}</div><div style={{fontFamily:'var(--mono)',fontSize:10,fontWeight:500,color:'var(--green)',marginTop:2}}>● онлайн</div></div>
                </div>}
              </div>
            </div>
            <div className={'content-area'+(tab==='chats'?' no-pad':'')}>
              {renderContent()}
            </div>
          </div>
        </div>
      </div>
      {profileUser&&<UserModal user={profileUser} onClose={()=>setProfileUser(null)} onChat={()=>{startChatGlobal(profileUser);setProfileUser(null)}}/>}
    </div>
  );
}

// Сообщаем VK, что приложение готово (нужно для VK Mini Apps; вне VK — просто игнорируется)
try{ if(window.vkBridge&&window.vkBridge.send){ window.vkBridge.send('VKWebAppInit',{}); } }catch(e){}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
